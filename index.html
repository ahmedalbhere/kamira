<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>كاميرا آيفون - معالجة الألوان الذكية | ملء الشاشة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* الحاوية الرئيسية - ملء الشاشة تمامًا */
        .fullscreen-camera {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* حاوية الكاميرا تأخذ كل المساحة المتاحة */
        .camera-wrapper {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            z-index: 2;
            pointer-events: none;
        }

        video {
            z-index: 1;
        }

        /* شريط التحكمات - خلفية شفافة مع تأثير زجاجي */
        .controls-bar {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            border-top: 0.5px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        button {
            background: rgba(44, 44, 46, 0.9);
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 2.5rem;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            flex: 1;
            min-width: 90px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
        }

        button.primary {
            background: #007aff;
            color: white;
        }

        button.capture-btn {
            background: #ffffff;
            color: #000;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 0.45rem 1rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            color: #e5e5e5;
            text-align: center;
            font-weight: 500;
            white-space: nowrap;
            overflow-x: auto;
        }

        /* تأثير فلاش عند التقاط الصورة */
        .flash-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        @media (max-width: 600px) {
            button {
                padding: 0.6rem 0.9rem;
                font-size: 0.8rem;
                min-width: 70px;
            }
            .status {
                font-size: 0.65rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="fullscreen-camera">
    <div class="camera-wrapper">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>
    <div class="controls-bar">
        <button id="toggleFilterBtn" class="primary">🎨 فلتر ON</button>
        <button id="captureBtn" class="capture-btn">📸 التقاط</button>
        <button id="resetBtn">🔄 إعادة ضبط</button>
        <div class="status" id="statusMsg">✅ جاهز</div>
    </div>
</div>
<div id="flash" class="flash-effect"></div>

<script>
    (function() {
        // --- عناصر DOM ---
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const toggleBtn = document.getElementById('toggleFilterBtn');
        const captureBtn = document.getElementById('captureBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusDiv = document.getElementById('statusMsg');
        const flashDiv = document.getElementById('flash');

        // --- حالة التطبيق ---
        let filterEnabled = true;
        let animationId = null;

        // --- إعدادات المعالجة (ألوان تشبه آيفون) ---
        let PROCESSING = {
            contrast: 1.12,
            saturation: 1.18,
            brightness: 1.02,
            gamma: 0.96,
            shadowBoost: 1.06,
            highlightProtect: 0.94,
            whiteBalanceTemp: 1.02
        };

        // --- دالة معالجة الصورة مثل كاميرا آيفون ---
        function processiPhoneLikeFilter(imageData) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;

            // Auto White Balance ديناميكي
            let sumR = 0, sumG = 0, sumB = 0;
            let pixelCount = width * height;
            for (let i = 0; i < data.length; i += 4) {
                sumR += data[i];
                sumG += data[i+1];
                sumB += data[i+2];
            }
            const avgR = sumR / pixelCount;
            const avgG = sumG / pixelCount;
            const avgB = sumB / pixelCount;
            const gainR = (avgG / avgR) * PROCESSING.whiteBalanceTemp;
            const gainB = (avgG / avgB) * (1 / PROCESSING.whiteBalanceTemp);
            
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // توازن أبيض
                r = r * gainR;
                b = b * gainB;
                
                let rNorm = r / 255;
                let gNorm = g / 255;
                let bNorm = b / 255;
                
                // تباين محسن
                rNorm = ((rNorm - 0.5) * PROCESSING.contrast) + 0.5;
                gNorm = ((gNorm - 0.5) * PROCESSING.contrast) + 0.5;
                bNorm = ((bNorm - 0.5) * PROCESSING.contrast) + 0.5;
                
                // جاما
                rNorm = Math.pow(rNorm, PROCESSING.gamma);
                gNorm = Math.pow(gNorm, PROCESSING.gamma);
                bNorm = Math.pow(bNorm, PROCESSING.gamma);
                
                // رفع الظلال
                if (rNorm < 0.45) rNorm = rNorm * PROCESSING.shadowBoost;
                if (gNorm < 0.45) gNorm = gNorm * PROCESSING.shadowBoost;
                if (bNorm < 0.45) bNorm = bNorm * PROCESSING.shadowBoost;
                
                // حماية الإضاءات العالية
                if (rNorm > 0.85) rNorm = rNorm * PROCESSING.highlightProtect;
                if (gNorm > 0.85) gNorm = gNorm * PROCESSING.highlightProtect;
                if (bNorm > 0.85) bNorm = bNorm * PROCESSING.highlightProtect;
                
                rNorm = rNorm * PROCESSING.brightness;
                gNorm = gNorm * PROCESSING.brightness;
                bNorm = bNorm * PROCESSING.brightness;
                
                // تشبع ذكي
                const luma = 0.2126 * rNorm + 0.7152 * gNorm + 0.0722 * bNorm;
                const sat = PROCESSING.saturation;
                rNorm = luma + (rNorm - luma) * sat;
                gNorm = luma + (gNorm - luma) * sat;
                bNorm = luma + (bNorm - luma) * sat;
                
                rNorm = Math.min(1.0, Math.max(0.0, rNorm));
                gNorm = Math.min(1.0, Math.max(0.0, gNorm));
                bNorm = Math.min(1.0, Math.max(0.0, bNorm));
                
                data[i] = Math.floor(rNorm * 255);
                data[i+1] = Math.floor(gNorm * 255);
                data[i+2] = Math.floor(bNorm * 255);
            }
            return imageData;
        }

        function passThrough(imageData) {
            return imageData;
        }

        // --- حلقة المعالجة (تطبيق الفلتر بشكل حي) ---
        function processFrame() {
            if (!video.videoWidth || !video.videoHeight) {
                animationId = requestAnimationFrame(processFrame);
                return;
            }

            if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
            }

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (filterEnabled) {
                imageData = processiPhoneLikeFilter(imageData);
            } else {
                imageData = passThrough(imageData);
            }
            
            ctx.putImageData(imageData, 0, 0);
            animationId = requestAnimationFrame(processFrame);
        }

        // --- وظيفة التقاط الصورة (مع تأثير فلاش وحفظ) ---
        function capturePhoto() {
            if (!canvas.width || !canvas.height) {
                statusDiv.innerHTML = "⚠️ انتظر حتى تعمل الكاميرا";
                return;
            }

            // تأثير فلاش أبيض
            flashDiv.style.opacity = "1";
            setTimeout(() => {
                flashDiv.style.opacity = "0";
            }, 150);

            // أخذ لقطة من الـ canvas (التي تحتوي على الفلتر إن كان مفعلاً)
            const capturedImage = canvas.toDataURL('image/jpeg', 0.95);
            
            // إنشاء رابط تحميل مؤقت
            const link = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
            link.download = `iPhone_camera_${timestamp}.jpg`;
            link.href = capturedImage;
            link.click();
            
            // عرض رسالة نجاح
            statusDiv.innerHTML = "📸 تم حفظ الصورة!";
            setTimeout(() => {
                if (filterEnabled) statusDiv.innerHTML = "🎨 فلتر آيفون مفعل";
                else statusDiv.innerHTML = "⚪️ الفلتر معطل";
            }, 2000);
        }

        // --- إعادة تعيين إعدادات المعالجة ---
        function resetToDefault() {
            PROCESSING.contrast = 1.12;
            PROCESSING.saturation = 1.18;
            PROCESSING.brightness = 1.02;
            PROCESSING.gamma = 0.96;
            PROCESSING.shadowBoost = 1.06;
            PROCESSING.highlightProtect = 0.94;
            PROCESSING.whiteBalanceTemp = 1.02;
            statusDiv.innerHTML = "🔄 تمت إعادة الضبط إلى إعدادات آيفون";
            setTimeout(() => {
                if (filterEnabled) statusDiv.innerHTML = "🎨 فلتر آيفون مفعل";
                else statusDiv.innerHTML = "⚪️ الفلتر معطل";
            }, 1500);
        }

        // --- بدء الكاميرا (مع ملء الشاشة تلقائيًا) ---
        async function initCamera() {
            try {
                // محاولة استخدام الكاميرا الخلفية للحصول على أفضل جودة
                let constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };
                
                let stream;
                try {
                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                } catch (err) {
                    console.warn("خلفية غير متاحة، نستخدم أي كاميرا", err);
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                }
                
                video.srcObject = stream;
                statusDiv.innerHTML = "📱 كاميرا نشطة | ملء الشاشة";
                
                video.onloadedmetadata = () => {
                    video.play();
                    if (animationId) cancelAnimationFrame(animationId);
                    animationId = requestAnimationFrame(processFrame);
                };
            } catch (error) {
                console.error("خطأ في الكاميرا:", error);
                statusDiv.innerHTML = "❌ لا يمكن الوصول للكاميرا";
            }
        }

        // --- أحداث الأزرار ---
        toggleBtn.addEventListener('click', () => {
            filterEnabled = !filterEnabled;
            if (filterEnabled) {
                toggleBtn.innerHTML = "🎨 فلتر ON";
                toggleBtn.classList.add("primary");
                statusDiv.innerHTML = "✅ تفعيل معالجة الألوان";
            } else {
                toggleBtn.innerHTML = "⚪️ فلتر OFF";
                toggleBtn.classList.remove("primary");
                statusDiv.innerHTML = "⭕️ تم إيقاف المعالجة";
            }
            setTimeout(() => {
                if (filterEnabled) statusDiv.innerHTML = "🎨 فلتر آيفون مفعل";
                else statusDiv.innerHTML = "⚪️ الفلتر معطل";
            }, 1500);
        });
        
        captureBtn.addEventListener('click', capturePhoto);
        resetBtn.addEventListener('click', resetToDefault);
        
        // منع الضغط المزدوج على زر التصوير
        captureBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            capturePhoto();
        });
        
        // بدء التطبيق
        initCamera();
        
        // تنظيف عند الخروج
        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
    })();
</script>
</body>
</html>
